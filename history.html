<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فوشيا - لوحة الإحصائيات والسجل</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; padding: 10px; text-align: center; margin: 0; }
        .nav { margin-bottom: 25px; padding-top: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .nav a, .nav button { text-decoration: none; color: #fff; background: #4b0082; padding: 10px 20px; border-radius: 25px; font-weight: bold; font-size: 14px; border: none; cursor: pointer; font-family: 'Cairo'; }
        
        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; padding: 0 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-bottom: 5px solid #4b0082; }
        .card h2 { margin: 0; color: #666; font-size: 13px; }
        .card p { margin: 10px 0 0; font-size: 18px; font-weight: bold; color: #4b0082; }
        .card.profit { border-bottom-color: #28a745; }
        .card.profit p { color: #28a745; }

        .container { max-width: 1000px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .charts-container { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .chart-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .table-responsive { width: 100%; overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px; }
        th { background: #4b0082; color: white; }
        .type-sale { color: #28a745; font-weight: bold; }
        .type-return { color: #d9534f; font-weight: bold; }

        .archive-status { background: #ffc107; color: #000; padding: 5px 15px; border-radius: 15px; display: inline-block; margin-bottom: 10px; font-size: 12px; font-weight: bold; display: none; }

        /* Print Settings for Mobile and Web */
        @media print {
            @page { size: auto; margin: 10mm; }
            html, body { 
                background: #fff !important; 
                height: auto !important; 
                overflow: visible !important; 
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .nav, .summary-cards, .charts-container, .no-print, .archive-status, #archiveBtn, #toggleViewBtn { 
                display: none !important; 
                visibility: hidden !important;
            }
            .container { 
                box-shadow: none !important; 
                width: 100% !important; 
                max-width: none !important; 
                margin: 0 !important; 
                padding: 10px !important; 
                display: block !important; 
                visibility: visible !important;
                position: static !important;
            }
            .table-responsive { 
                overflow: visible !important; 
                display: block !important; 
                width: 100% !important; 
                visibility: visible !important;
            }
            table { 
                width: 100% !important; 
                border: 1px solid #000 !important; 
                visibility: visible !important;
                table-layout: auto !important;
            }
            th, td { 
                border: 1px solid #ccc !important; 
                color: #000 !important; 
                background: #fff !important; 
                visibility: visible !important;
                padding: 8px !important;
            }
            #tableTitle {
                display: block !important;
                visibility: visible !important;
                margin-top: 20px !important;
            }
        }

        @media (min-width: 768px) {
            .charts-container { flex-direction: row; }
            .chart-box { flex: 1; }
            .summary-cards { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html">🏠 الفاتورة</a>
        <a href="products.html">📦 المخزن</a>
        <button onclick="smartPrint()" style="background:#28a745;">🖨️ طباعة</button>
        <button id="archiveBtn" onclick="archiveCurrentHistory()" style="background:#dc3545;">🧹 تصفير السجل</button>
        <button id="toggleViewBtn" onclick="toggleArchiveView()" style="background:#6c757d;">📂 عرض الأرشيف</button>
    </div>

    <div class="summary-cards">
        <div class="card">
            <h2>مبيعات اليوم</h2>
            <p id="daySales">0</p>
        </div>
        <div class="card profit">
            <h2>ربح اليوم</h2>
            <p id="dayProfit">0</p>
        </div>
        <div class="card">
            <h2>مبيعات الشهر</h2>
            <p id="monthSales">0</p>
        </div>
        <div class="card profit">
            <h2>ربح الشهر</h2>
            <p id="monthProfit">0</p>
        </div>
    </div>

    <div class="container" id="printableArea">
        <div id="archiveLabel" class="archive-status">⚠️ أنت تستعرض الأرشيف (سجلات قديمة)</div>
        
        <div class="no-print">
            <h3>📊 الإحصائيات</h3>
            <div class="charts-container">
                <div class="chart-box" style="height: 300px; position: relative;">
                    <canvas id="dailySalesChart"></canvas>
                </div>
                <div class="chart-box" style="height: 300px; position: relative;">
                    <canvas id="productQtyChart"></canvas>
                </div>
            </div>
        </div>

        <h3 id="tableTitle">📝 سجل العمليات الحالي</h3>
        <div class="table-responsive">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th>الرقم</th>
                        <th>الوقت</th>
                        <th>النوع</th>
                        <th>المبيعات</th>
                        <th>التكلفة</th>
                        <th>الربح</th>
                        <th>التفاصيل</th>
                    </tr>
                </thead>
                <tbody id="historyTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcd740Bwq4XRrMzVPVqI-G4SmpzvCNqlU",
            databaseURL: "https://fuchsia-web-e1ffe-default-rtdb.firebaseio.com",
            projectId: "fuchsia-web-e1ffe",
            appId: "1:1036149958008:web:673873d603b7fcbb29148d"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        let dailyChart, productChart;
        let allProducts = {};
        let isArchiveView = false;

        function smartPrint() {
            window.scrollTo(0,0);
            setTimeout(() => { 
                window.print(); 
            }, 500);
        }

        db.ref("products").on("value", snapshot => {
            allProducts = snapshot.val() || {};
            loadHistory();
        });

        // تصفير السجل الحالي ونقله للأرشيف
        async function archiveCurrentHistory() {
            if (!confirm("هل أنت متأكد من تصفير السجل الحالي ونقله للأرشيف؟")) return;
            const snapshot = await db.ref("history").once("value");
            if (!snapshot.exists()) return alert("السجل فارغ بالفعل!");
            const historyData = snapshot.val();
            const archiveRef = db.ref("archived_history").push();
            await archiveRef.set({ archivedAt: new Date().toLocaleString(), data: historyData });
            await db.ref("history").remove();
            alert("تم التصفير بنجاح ونقل البيانات للأرشيف.");
        }

        // التبديل بين عرض السجل الحالي والأرشيف
        function toggleArchiveView() {
            isArchiveView = !isArchiveView;
            const btn = document.getElementById("toggleViewBtn");
            const label = document.getElementById("archiveLabel");
            const title = document.getElementById("tableTitle");
            const archiveBtn = document.getElementById("archiveBtn");

            if (isArchiveView) {
                btn.innerText = "🏠 العودة للحالي";
                label.style.display = "inline-block";
                title.innerText = "📂 أرشيف العمليات السابقة";
                archiveBtn.style.display = "none";
                loadArchivedData();
            } else {
                btn.innerText = "📂 عرض الأرشيف";
                label.style.display = "none";
                title.innerText = "📝 سجل العمليات الحالي";
                archiveBtn.style.display = "inline-block";
                loadHistory();
            }
        }

        function loadHistory() {
            if (isArchiveView) return;
            db.ref("history").on("value", snapshot => {
                const data = snapshot.val() || {};
                const historyArray = Object.values(data).reverse();
                renderStats(historyArray);
                renderTable(historyArray);
            });
        }

        async function loadArchivedData() {
            const snapshot = await db.ref("archived_history").once("value");
            let combinedData = [];
            if (snapshot.exists()) {
                Object.values(snapshot.val()).forEach(archive => {
                    if (archive.data) combinedData = combinedData.concat(Object.values(archive.data));
                });
            }
            combinedData.reverse();
            renderStats(combinedData);
            renderTable(combinedData);
        }

        function calculateInvCost(inv) {
            let invCost = 0;
            if(inv.items && Array.isArray(inv.items)) {
                inv.items.forEach(item => {
                    let itemCost = parseFloat(item.cost || item.pCost || 0);
                    if (itemCost === 0) {
                        const productKey = Object.keys(allProducts).find(k => allProducts[k].name === item.name);
                        if (productKey) itemCost = parseFloat(allProducts[productKey].cost || 0);
                    }
                    invCost += (itemCost * (parseInt(item.qty) || 0));
                });
            }
            return invCost;
        }

        function renderStats(data) {
            const today = new Date().toLocaleDateString('en-CA');
            const thisMonth = today.substring(0, 7); 
            let dSales = 0, dProfit = 0, mSales = 0, mProfit = 0;
            let dailyTotals = {}, productQuantities = {};

            data.forEach(inv => {
                let invCost = calculateInvCost(inv);
                const currentTotal = parseFloat(inv.total || 0);
                if(inv.type === "return") invCost = -Math.abs(invCost);
                const invProfit = currentTotal - invCost;

                if (inv.date === today) { dSales += currentTotal; dProfit += invProfit; }
                if (inv.date && inv.date.startsWith(thisMonth)) { mSales += currentTotal; mProfit += invProfit; }
                if(inv.date) dailyTotals[inv.date] = (dailyTotals[inv.date] || 0) + currentTotal;
                if(inv.items) {
                    inv.items.forEach(item => {
                        productQuantities[item.name] = (productQuantities[item.name] || 0) + (parseInt(item.qty) || 0);
                    });
                }
            });

            document.getElementById('daySales').innerText = dSales.toLocaleString('ar-EG') + " ج.م";
            document.getElementById('dayProfit').innerText = dProfit.toLocaleString('ar-EG') + " ج.م";
            document.getElementById('monthSales').innerText = mSales.toLocaleString('ar-EG') + " ج.م";
            document.getElementById('monthProfit').innerText = mProfit.toLocaleString('ar-EG') + " ج.م";
            renderCharts(dailyTotals, productQuantities);
        }

        function renderTable(data) {
            const table = document.getElementById("historyTable");
            table.innerHTML = "";
            data.slice(0, 100).forEach(inv => {
                const invCost = calculateInvCost(inv);
                const currentTotal = parseFloat(inv.total || 0);
                let displayedCost = invCost;
                if(inv.type === 'return') displayedCost = -Math.abs(invCost);
                const invProfit = currentTotal - displayedCost;
                const itemsList = inv.items ? inv.items.map(it => `${it.name} (${it.qty})`).join(', ') : '---';

                table.innerHTML += `
                    <tr>
                        <td>#${inv.invoiceNum || '---'}</td>
                        <td style="font-size:11px">${inv.date || '---'}<br>${inv.time || ''}</td>
                        <td class="${inv.type === 'sale' ? 'type-sale' : 'type-return'}">${inv.type === 'sale' ? 'بيع' : 'مرتجع'}</td>
                        <td>${currentTotal.toFixed(2)}</td>
                        <td>${Math.abs(invCost).toFixed(2)}</td>
                        <td style="font-weight:bold; color:${invProfit >= 0 ? 'green' : 'red'}">${invProfit.toFixed(2)}</td>
                        <td style="font-size:10px; color:#555">${itemsList}</td>
                    </tr>
                `;
            });
        }

        function renderCharts(dailyTotals, productQuantities) {
            const dateLabels = Object.keys(dailyTotals).sort();
            const dateValues = dateLabels.map(d => dailyTotals[d]);
            if (dailyChart) dailyChart.destroy();
            dailyChart = new Chart(document.getElementById('dailySalesChart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: dateLabels,
                    datasets: [{ label: 'المبيعات', data: dateValues, borderColor: '#4b0082', backgroundColor: 'rgba(75, 0, 130, 0.1)', fill: true }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            const sortedProducts = Object.entries(productQuantities).sort((a, b) => b[1] - a[1]).slice(0, 8);
            if (productChart) productChart.destroy();
            productChart = new Chart(document.getElementById('productQtyChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: sortedProducts.map(p => p[0]),
                    datasets: [{ label: 'القطع', data: sortedProducts.map(p => p[1]), backgroundColor: '#f72585' }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
