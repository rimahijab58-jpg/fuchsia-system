<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فوشيا - فاتورة السحاب</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .nav { margin-bottom: 20px; background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav a { text-decoration: none; color: #007bff; font-weight: bold; margin: 0 10px; }
        .container { max-width: 550px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-box { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; text-align: right; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .btn-add { background: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #eee; padding: 10px; border-bottom: 2px solid #ddd; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .total-area { margin-top: 20px; font-size: 22px; font-weight: bold; color: #d9534f; }
        .btn-print { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 15px; font-weight: bold; }
        @media print { .no-print, .nav, .input-box { display: none; } .container { box-shadow: none; border: none; width: 100%; } }
    </style>
</head>
<body>

<div class="nav no-print">
    <a href="index.html">🧾 الفاتورة</a> | <a href="products.html">📦 المخزن</a>
</div>

<div class="container">
    <h1>فوشيا - FUCHSIA</h1>
    <p style="color: #666;">إدارة المبيعات السحابية</p>

    <div class="input-box no-print">
        <label>اختر المنتج:</label>
        <select id="productSelect">
            <option value="">⏳ جاري جلب المنتجات من السحاب...</option>
        </select>
        <label>الكمية:</label>
        <input type="number" id="qty" value="1" min="1">
        <button class="btn-add" onclick="addToInvoice()">+ إضافة للفاتورة</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>الصنف</th>
                <th>سعر</th>
                <th>كمية</th>
                <th>إجمالي</th>
            </tr>
        </thead>
        <tbody id="invoiceBody"></tbody>
    </table>

    <div class="total-area">الإجمالي: <span id="finalTotal">0</span> ج.م</div>

    <button class="btn-print no-print" onclick="processAndPrint()">🖨️ حفظ وخصم وطباعة</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// إعدادات Fuchsia-Web الخاصة بك من الصورة
const firebaseConfig = {
  apiKey: "AIzaSyCcd740Bwq4XRrMzVPVqI-G4SmpzvCNqlU",
  authDomain: "fuchsia-web-e1ffe.firebaseapp.com",
  databaseURL: "https://fuchsia-web-e1ffe-default-rtdb.firebaseio.com",
  projectId: "fuchsia-web-e1ffe",
  storageBucket: "fuchsia-web-e1ffe.firebasestorage.app",
  messagingSenderId: "1036149958008",
  appId: "1:1036149958008:web:673873d603b7fcbb29148d"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.database();

let cloudProducts = {}; 
let invoiceItems = []; 

// جلب المنتجات من السحاب وتحديث القائمة فوراً
db.ref("products").on("value", (snapshot) => {
    cloudProducts = snapshot.val() || {};
    const select = document.getElementById("productSelect");
    if (select) {
        select.innerHTML = '<option value="">-- اختر صنف --</option>';
        Object.keys(cloudProducts).forEach(id => {
            let p = cloudProducts[id];
            select.innerHTML += `<option value="${id}">${p.name} (متاح: ${p.stock})</option>`;
        });
    }
});

function addToInvoice() {
    const productId = document.getElementById("productSelect").value;
    const qty = parseInt(document.getElementById("qty").value);
    if (!productId || qty <= 0) return alert("اختر منتجاً!");

    const p = cloudProducts[productId];
    if (qty > p.stock) return alert("عفواً! المخزن لا يكفي.");

    invoiceItems.push({ id: productId, name: p.name, price: p.price, qty: qty, total: p.price * qty });
    render();
}

function render() {
    const tbody = document.getElementById("invoiceBody");
    let grandTotal = 0;
    tbody.innerHTML = "";
    invoiceItems.forEach(item => {
        grandTotal += item.total;
        tbody.innerHTML += `<tr><td>${item.name}</td><td>${item.price}</td><td>${item.qty}</td><td>${item.total}</td></tr>`;
    });
    document.getElementById("finalTotal").innerText = grandTotal;
}

async function processAndPrint() {
    if (invoiceItems.length === 0) return alert("الفاتورة فارغة!");
    if (!confirm("تأكيد البيع والخصم من السحاب؟")) return;

    try {
        for (let item of invoiceItems) {
            let newStock = cloudProducts[item.id].stock - item.qty;
            await db.ref("products/" + item.id).update({ stock: newStock });
        }
        alert("تمت العملية بنجاح!");
        window.print();
        location.reload();
    } catch (e) { alert("خطأ في الاتصال بالسحاب!"); }
}
</script>
</body>
</html>
