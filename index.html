<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فوشيا - FUCHSIA</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; text-align: center; }
        .nav { margin-bottom: 20px; }
        .nav a { text-decoration: none; color: #d9534f; margin: 0 10px; font-weight: bold; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border: 1px solid #ccc; }
        h1 { color: #333; margin-bottom: 10px; }
        .input-box { border: 2px solid #eee; padding: 15px; margin-bottom: 20px; text-align: right; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; font-size: 16px; }
        .btn-add { background: #5bc0de; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f8f8f8; }
        .total { font-size: 24px; color: red; font-weight: bold; margin: 20px 0; }
        .btn-print { background: #5cb85c; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-size: 18px; font-weight: bold; }
        /* تصميم قائمة البحث */
        .search-container { position: relative; }
        #searchResult { position: absolute; width: 100%; background: white; border: 1px solid #ddd; z-index: 100; max-height: 150px; overflow-y: auto; display: none; text-align: right; }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .search-item:hover { background: #f0f0f0; }
        @media print { .no-print { display: none; } .container { border: none; width: 100%; } }
    </style>
</head>
<body>

<div class="nav no-print">
    <a href="index.html">🧾 الفاتورة</a> | <a href="products.html">📦 المخزن</a> | <a href="history.html">📑 السجل والشارت</a>
</div>

<div class="container">
    <h1>FUCHSIA - فوشيا</h1>
    <p>نظام إدارة المبيعات</p>

    <div class="input-box no-print">
        <label>ابحث عن المنتج:</label>
        <div class="search-container">
            <input type="text" id="productSearch" placeholder="اكتب اسم المنتج هنا..." oninput="filterProducts()">
            <div id="searchResult"></div>
        </div>
        
        <input type="hidden" id="selectedProductId">
        <label>الكمية:</label>
        <input type="number" id="qty" value="1" min="1">
        <button class="btn-add" onclick="addToInvoice()">إضافة للفاتورة +</button>
    </div>

    <table id="invoiceTable">
        <thead>
            <tr>
                <th>الصنف</th>
                <th>سعر</th>
                <th>كمية</th>
                <th>إجمالي</th>
            </tr>
        </thead>
        <tbody id="invoiceBody"></tbody>
    </table>

    <div class="total">الإجمالي: <span id="finalTotal">0</span> ج.م</div>

    <button class="btn-print no-print" onclick="processAndPrint()">حفظ وطباعة الفاتورة ✅</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCcd740Bwq4XRrMzVPVqI-G4SmpzvCNqlU",
  authDomain: "fuchsia-web-e1ffe.firebaseapp.com",
  databaseURL: "https://fuchsia-web-e1ffe-default-rtdb.firebaseio.com",
  projectId: "fuchsia-web-e1ffe",
  storageBucket: "fuchsia-web-e1ffe.firebasestorage.app",
  messagingSenderId: "1036149958008",
  appId: "1:1036149958008:web:673873d603b7fcbb29148d"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.database();

let cloudProducts = {}; 
let invoiceItems = []; 

// جلب المنتجات من السحاب
db.ref("products").on("value", (snapshot) => {
    cloudProducts = snapshot.val() || {};
});

// دالة البحث الذكي
function filterProducts() {
    const input = document.getElementById("productSearch").value.toLowerCase();
    const resultDiv = document.getElementById("searchResult");
    resultDiv.innerHTML = "";
    
    if (input === "") {
        resultDiv.style.display = "none";
        return;
    }

    let found = false;
    Object.keys(cloudProducts).forEach(id => {
        const p = cloudProducts[id];
        if (p.name.toLowerCase().includes(input)) {
            const item = document.createElement("div");
            item.className = "search-item";
            item.innerHTML = `${p.name} (متاح: ${p.stock})`;
            item.onclick = () => selectProduct(id, p.name);
            resultDiv.appendChild(item);
            found = true;
        }
    });

    resultDiv.style.display = found ? "block" : "none";
}

function selectProduct(id, name) {
    document.getElementById("selectedProductId").value = id;
    document.getElementById("productSearch").value = name;
    document.getElementById("searchResult").style.display = "none";
}

function addToInvoice() {
    const id = document.getElementById("selectedProductId").value;
    const qty = parseInt(document.getElementById("qty").value);

    if (!id || qty <= 0) return alert("اختار منتج الأول!");
    const p = cloudProducts[id];

    if (qty > p.stock) return alert("المخزن مش كفاية!");

    invoiceItems.push({ id, name: p.name, price: p.price, qty, total: p.price * qty });
    
    // تصفير البحث بعد الإضافة
    document.getElementById("productSearch").value = "";
    document.getElementById("selectedProductId").value = "";
    render();
}

function render() {
    const tbody = document.getElementById("invoiceBody");
    let total = 0;
    tbody.innerHTML = "";
    invoiceItems.forEach(item => {
        total += item.total;
        tbody.innerHTML += `<tr><td>${item.name}</td><td>${item.price}</td><td>${item.qty}</td><td>${item.total}</td></tr>`;
    });
    document.getElementById("finalTotal").innerText = total;
}

async function processAndPrint() {
    if (invoiceItems.length === 0) return;
    if (!confirm("تأكيد البيع؟")) return;

    const now = new Date();
    const saleData = {
        timestamp: now.getTime(),
        date: now.toLocaleDateString('en-CA'),
        items: invoiceItems,
        total: document.getElementById("finalTotal").innerText
    };

    for (let item of invoiceItems) {
        await db.ref("products/" + item.id).update({ stock: cloudProducts[item.id].stock - item.qty });
    }
    
    // حفظ في التاريخ (History)
    await db.ref("history").push(saleData);

    alert("تم الحفظ بنجاح!");
    window.print();
    location.reload();
}
</script>
</body>
</html>
