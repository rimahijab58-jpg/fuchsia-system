<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUCHSIA POS - فوشيا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #000;
            --return-color: #d9534f;
            --edit-color: #f0ad4e;
            --bg-gray: #f9f9f9;
            --accent-blue: #5bc0de;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { background-color: #e2e8f0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .container { border: 1px solid #000 !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; }
        }

        /* شريط التنقل الجديد */
        .nav-bar {
            background: #eee;
            padding: 10px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav-item {
            text-decoration: none;
            color: #4b0082;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        .nav-item:hover { opacity: 0.7; }

        .no-print-area { margin-bottom: 15px; width: 100%; max-width: 650px; display: flex; gap: 10px; justify-content: center; }
        .btn-return-toggle { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .container { 
            width: 650px; background: white; padding: 25px; border: 2px solid #000; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            transition: all 0.3s ease; position: relative;
        }

        /* رأس الفاتورة */
        .receipt-header {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1.2fr;
            align-items: flex-start;
            border-bottom: 2px solid #000;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .brand-section { text-align: right; }
        .brand-section h1 { margin: 0; font-size: 42px; font-weight: 900; line-height: 1; letter-spacing: -1px; }
        .shop-info { font-size: 13px; color: #333; margin-top: 8px; line-height: 1.6; font-weight: bold; }

        .qr-section { text-align: center; }
        .qr-section img { width: 95px; height: 95px; border: 1px solid #eee; padding: 2px; }

        .invoice-info { text-align: left; font-size: 13px; font-weight: bold; }
        .invoice-info p { margin: 2px 0; }

        /* مدخلات البيانات */
        .input-box { background: #fdfdfd; border: 1px dashed #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; text-align: right; }
        .search-container { position: relative; margin-bottom: 10px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; margin-bottom: 10px; text-align: center; }
        input:focus { border-color: var(--accent-blue); outline: none; }

        #searchResult { 
            position: absolute; width: 100%; background: white; border: 1px solid #ddd; 
            z-index: 1000; display: none; max-height: 200px; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #f0f0f0; text-align: right; display: flex; justify-content: space-between; }
        .search-item:hover { background: #f0f0f0; }

        /* الجدول */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f4f4f4; border: 1px solid #000; padding: 10px; font-weight: bold; font-size: 14px; }
        td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 14px; vertical-align: middle; }

        .total-box { 
            margin-top: 20px; padding: 15px; border-top: 2px solid #000; border-bottom: 2px solid #000;
            font-size: 30px; color: red; font-weight: bold; text-align: center; 
        }

        /* أزرار الإجراءات الملونة */
        .action-btn { border: none; padding: 6px; cursor: pointer; border-radius: 6px; font-size: 16px; margin: 0 2px; width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; }
        .btn-edit-row { background: #ffc107; color: #000; }
        .btn-del-row { background: #d9534f; color: white; }

        .footer-note { margin-top: 15px; font-size: 15px; font-weight: bold; text-align: center; }

        /* شريط جوجل السفلي */
        .google-bar {
            margin-top: 20px; display: flex; align-items: center; justify-content: center;
            border: 1px solid #ddd; border-radius: 30px; padding: 8px 20px; background: #fff; gap: 10px;
        }
        .google-bar img { width: 20px; }

        .btn-save-print { 
            background: #5cb85c; color: white; border: none; padding: 15px; width: 100%; 
            border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* وضع المرتجع */
        .return-mode .container { border-color: var(--return-color); background-color: #fffafa; }
        #returnBadge { 
            display: none; background: var(--return-color); color: white; padding: 8px; 
            font-weight: bold; font-size: 20px; margin-bottom: 15px; border-radius: 4px; text-align: center;
        }
    </style>
</head>
<body id="bodyTag">

    <!-- شريط التنقل العلوي -->
    <div class="nav-bar no-print">
        <a href="#" class="nav-item" onclick="location.reload()">🏠 فاتورة</a>
        <div class="nav-item">📦 مخزن</div>
        <div class="nav-item">📄 سجل</div>
    </div>

    <div class="no-print-area no-print">
        <button class="btn-return-toggle" onclick="toggleReturn()">🔄 وضع المرتجع</button>
    </div>

    <div class="container" id="invoice">
        <div id="returnBadge">فـاتـورة مـرتـجـع 🔄</div>
        
        <header class="receipt-header">
            <div class="brand-section">
                <h1>فـوشـيـا</h1>
                <div class="shop-info">
                    طرحة - خمار - زي شرعي<br>
                    سمسطا - شارع بور سعيد<br>
                    واتساب: 01287863711
                </div>
            </div>

            <div class="qr-section">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=FuchsiaPOS" alt="QR">
            </div>

            <div class="invoice-info">
                <p>رقم الفاتورة: <span id="invNum">---</span></p>
                <p>التاريخ: <span id="invDate">---</span></p>
                <p>العميل: Cash Customer</p>
            </div>
        </header>

        <!-- منطقة المدخلات -->
        <div class="input-box no-print">
            <div class="search-container">
                <label>ابحث عن المنتج:</label>
                <input type="text" id="pSearch" placeholder="اكتب اسم المنتج هنا..." autocomplete="off">
                <div id="searchResult"></div>
            </div>
            <div style="display: flex; gap: 10px;">
                <div style="flex:1">
                    <label>السعر:</label>
                    <input type="number" id="pPrice" placeholder="السعر">
                </div>
                <div style="flex:1">
                    <label>الكمية:</label>
                    <input type="number" id="pQty" value="1">
                </div>
            </div>
            <button class="btn-nav" id="addBtn" style="width:100%; background: var(--accent-blue); color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="addItem()">إضافة للفاتورة +</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th width="40%">الصنف</th>
                    <th>سعر</th>
                    <th>كمية</th>
                    <th>إجمالي</th>
                    <th class="no-print" width="15%">إجراء</th>
                </tr>
            </thead>
            <tbody id="invoiceBody"></tbody>
        </table>

        <div class="total-box">
            الإجمالي النهائي: <span id="finalTotal">0</span> ج.م
        </div>

        <div class="footer-note">شكراً لزيارتكم -- شرفتمونا</div>

        <div class="google-bar">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
            <strong>فوشيا سمسطا</strong>
        </div>

        <button class="btn-save-print no-print" onclick="finish()">
            <span>✅</span> حفظ وطباعة الفاتورة
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcd740Bwq4XRrMzVPVqI-G4SmpzvCNqlU",
            databaseURL: "https://fuchsia-web-e1ffe-default-rtdb.firebaseio.com",
            projectId: "fuchsia-web-e1ffe",
            appId: "1:1036149958008:web:673873d603b7fcbb29148d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cloudProducts = {}, items = [], selectedId = null, isReturn = false;
        
        document.getElementById('invDate').innerText = new Date().toLocaleDateString('en-CA');
        document.getElementById('invNum').innerText = Math.floor(Math.random() * 10000);

        db.ref("products").on("value", s => cloudProducts = s.val() || {});

        const pSearch = document.getElementById("pSearch");
        const resBox = document.getElementById("searchResult");
        const priceInput = document.getElementById("pPrice");
        const qtyInput = document.getElementById("pQty");

        pSearch.oninput = function() {
            const val = this.value.toLowerCase();
            resBox.innerHTML = "";
            if(!val) { resBox.style.display="none"; return; }
            Object.keys(cloudProducts).forEach(id => {
                const p = cloudProducts[id];
                if(p.name.toLowerCase().includes(val)) {
                    let d = document.createElement("div"); d.className="search-item";
                    d.innerHTML = `<span>${p.name}</span> <b>(مخزن: ${p.stock})</b>`;
                    d.onclick = () => {
                        selectedId = id;
                        pSearch.value = p.name;
                        priceInput.value = p.price;
                        resBox.style.display = "none";
                        qtyInput.focus();
                        qtyInput.select();
                    };
                    resBox.appendChild(d);
                }
            });
            resBox.style.display = resBox.innerHTML ? "block" : "none";
        };

        function addItem() {
            const n = pSearch.value;
            const p = parseFloat(priceInput.value);
            const q = parseInt(qtyInput.value);
            if(!n || isNaN(p)) return;

            items.push({ id: selectedId, name: n, price: p, qty: q, total: p * q });
            renderTable();
            clearInputs();
        }

        function renderTable() {
            const b = document.getElementById("invoiceBody");
            let t = 0; b.innerHTML = "";
            items.forEach((item, index) => {
                t += item.total;
                b.innerHTML += `<tr>
                    <td>${item.name}</td>
                    <td>${item.price}</td>
                    <td>${item.qty}</td>
                    <td>${item.total}</td>
                    <td class="no-print">
                        <button class="action-btn btn-edit-row" onclick="editItem(${index})">✏️</button>
                        <button class="action-btn btn-del-row" onclick="deleteItem(${index})">🗑️</button>
                    </td>
                </tr>`;
            });
            document.getElementById("finalTotal").innerText = t;
        }

        function editItem(index) {
            const itm = items[index];
            selectedId = itm.id;
            pSearch.value = itm.name;
            priceInput.value = itm.price;
            qtyInput.value = itm.qty;
            
            items.splice(index, 1);
            renderTable();
            pSearch.focus();
        }

        function deleteItem(index) {
            items.splice(index, 1);
            renderTable();
        }

        function clearInputs() {
            pSearch.value = ""; priceInput.value = ""; qtyInput.value = "1";
            selectedId = null; pSearch.focus();
        }

        function toggleReturn() {
            isReturn = !isReturn;
            document.getElementById('bodyTag').classList.toggle('return-mode');
            document.getElementById('returnBadge').style.display = isReturn ? 'block' : 'none';
        }

        async function finish() {
            if(items.length === 0) return;
            for(let i of items) {
                if(i.id && cloudProducts[i.id]) {
                    let s = cloudProducts[i.id].stock;
                    await db.ref("products/"+i.id).update({stock: isReturn ? s + i.qty : s - i.qty});
                }
            }
            let total = parseFloat(document.getElementById("finalTotal").innerText);
            await db.ref("history").push({
                date: new Date().toLocaleDateString('en-CA'),
                total: isReturn ? -total : total,
                type: isReturn ? "return" : "sale",
                items: items
            });
            window.print();
            location.reload();
        }
    </script>
</body>
</html>
