<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فوشيا - تحليل المبيعات</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .nav { margin-bottom: 20px; }
        .nav a { text-decoration: none; color: #fff; background: #d9534f; padding: 10px 20px; border-radius: 5px; font-weight: bold; }
        .dashboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .chart-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { color: #333; }
        h3 { color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html">🧾 العودة لنظام الفواتير</a>
    </div>

    <h1>📊 لوحة تحكم فوشيا - FUCHSIA</h1>

    <div class="dashboard">
        <div class="chart-card">
            <h3>إجمالي المبيعات اليومية (ج.م)</h3>
            <canvas id="dailySalesChart"></canvas>
        </div>

        <div class="chart-card">
            <h3>كمية المبيعات من كل صنف (قطعة)</h3>
            <canvas id="productQtyChart"></canvas>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCcd740Bwq4XRrMzVPVqI-G4SmpzvCNqlU",
          authDomain: "fuchsia-web-e1ffe.firebaseapp.com",
          databaseURL: "https://fuchsia-web-e1ffe-default-rtdb.firebaseio.com",
          projectId: "fuchsia-web-e1ffe",
          storageBucket: "fuchsia-web-e1ffe.firebasestorage.app",
          messagingSenderId: "1036149958008",
          appId: "1:1036149958008:web:673873d603b7fcbb29148d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref("history").on("value", snapshot => {
            const historyData = snapshot.val() || {};
            
            const dailyTotals = {}; // مبيعات كل يوم
            const productQuantities = {}; // كمية كل صنف

            Object.values(historyData).forEach(sale => {
                // 1. حساب الإجمالي اليومي
                dailyTotals[sale.date] = (dailyTotals[sale.date] || 0) + parseFloat(sale.total);

                // 2. حساب كمية كل صنف
                if (sale.items) {
                    sale.items.forEach(item => {
                        productQuantities[item.name] = (productQuantities[item.name] || 0) + parseInt(item.qty);
                    });
                }
            });

            // رسم الشارت الأول (المبيعات اليومية)
            const dateLabels = Object.keys(dailyTotals).sort();
            const dateValues = dateLabels.map(d => dailyTotals[d]);

            new Chart(document.getElementById('dailySalesChart'), {
                type: 'line', // نوع الخط لإظهار النمو
                data: {
                    labels: dateLabels,
                    datasets: [{
                        label: 'المبيعات بالجنيه',
                        data: dateValues,
                        borderColor: '#28a745',
                        backgroundColor: 'rgba(40, 167, 69, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                }
            });

            // رسم الشارت الثاني (الأصناف الأكثر مبيعاً)
            const productLabels = Object.keys(productQuantities);
            const productValues = productLabels.map(p => productQuantities[p]);

            new Chart(document.getElementById('productQtyChart'), {
                type: 'bar', // نوع الأعمدة للمقارنة بين الأصناف
                data: {
                    labels: productLabels,
                    datasets: [{
                        label: 'عدد القطع المباعة',
                        data: productValues,
                        backgroundColor: ['#f72585', '#7209b7', '#4cc9f0', '#4895ef', '#3f37c9'],
                        borderWidth: 1
                    }]
                },
                options: {
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        });
    </script>
</body>
</html>
