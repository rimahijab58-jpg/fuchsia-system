<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجل الفواتير</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* تحسينات بسيطة لمظهر الجدول */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div style="margin-bottom:15px; text-align: center;">
    <a href="index.html">🧾 Invoice</a> |
    <a href="products.html">📦 Products</a> |
    <a href="history.html">📑 History</a>
</div>

<div class="invoice" style="max-width: 900px; margin: auto;">
    <h2>📑 سجل الفواتير المحفوظة</h2>

    <table id="historyTable">
        <thead>
            <tr>
                <th>رقم الفاتورة</th>
                <th>التاريخ</th>
                <th>اسم العميل</th>
                <th>الإجمالي</th>
                <th>تفاصيل</th>
            </tr>
        </thead>
        <tbody id="historyList"></tbody>
    </table>
    <button onclick="clearHistory()" style="background: #dc3545; color: white; margin-top: 20px; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px;">مسح السجل بالكامل</button>
</div>

<script>
    function loadHistory() {
        let history = JSON.parse(localStorage.getItem("invoiceHistory")) || [];
        let list = document.getElementById("historyList");
        list.innerHTML = "";

        history.forEach((inv, index) => {
            // ملاحظة: تم تغيير inv.grandTotal إلى inv.total ليتوافق مع كود الحفظ
            let row = `
            <tr>
                <td>${inv.id || (index + 1)}</td>
                <td>${inv.date}</td>
                <td>${inv.customer}</td>
                <td style="font-weight: bold; color: #28a745;">${inv.total}</td> 
                <td><button onclick="viewDetails(${index})" style="width: auto; padding: 5px 15px; cursor: pointer;">عرض الأصناف</button></td>
            </tr>`;
            list.insertAdjacentHTML("beforeend", row);
        });
    }

    function viewDetails(index) {
        let history = JSON.parse(localStorage.getItem("invoiceHistory"));
        let inv = history[index];
        
        if (inv.items && inv.items.length > 0) {
            let details = inv.items.map(i => `- ${i.name} (السعر: ${i.price} | الكمية: ${i.qty} | الإجمالي: ${i.lineTotal})`).join("\n");
            alert("تفاصيل المنتجات في فاتورة " + inv.customer + ":\n" + details);
        } else {
            alert("لا توجد تفاصيل أصناف لهذه الفاتورة.");
        }
    }

    function clearHistory() {
        if(confirm("هل أنت متأكد من مسح جميع الفواتير من السجل؟")) {
            localStorage.removeItem("invoiceHistory");
            loadHistory();
        }
    }

    window.onload = loadHistory;
</script>
</body>
</html>
