<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فوشيا - إدارة المخزن والبيانات</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .nav { margin-bottom: 20px; }
        .nav a { text-decoration: none; color: #7209b7; margin: 0 10px; font-weight: bold; }
        .container { max-width: 850px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .actions-bar { display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #7209b7; }
        .input-group { margin-bottom: 20px; display: flex; gap: 5px; justify-content: center; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-excel { background: #1d6f42; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #7209b7; color: white; }
        .stock-low { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="nav">
    <a href="index.html">🧾 الفاتورة</a> | <a href="history.html">📊 التقارير</a>
</div>

<div class="container">
    <h1>📦 إدارة مخزن فوشيا</h1>

    <div class="input-group">
        <input type="text" id="pName" placeholder="اسم المنتج">
        <input type="number" id="pPrice" placeholder="السعر">
        <input type="number" id="pStock" placeholder="الكمية">
        <button onclick="saveProduct()">إضافة/تحديث المنتج ✅</button>
    </div>

    <div class="actions-bar">
        <div>
            <strong>📥 استيراد من إكسيل:</strong>
            <input type="file" id="excelFile" accept=".xlsx, .xls" style="width: auto;">
            <button class="btn-excel" onclick="importExcel()">رفع الملف 📁</button>
        </div>
        <div style="font-size: 12px; color: #666;">
            * لو المنتج موجود قبل كده، الكمية هتزيد تلقائيًا.
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>الاسم</th>
                <th>السعر</th>
                <th>المخزن</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody id="productTable"></tbody>
    </table>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCcd740Bwq4XRrMzVPVqI-G4SmpzvCNqlU",
  authDomain: "fuchsia-web-e1ffe.firebaseapp.com",
  databaseURL: "https://fuchsia-web-e1ffe-default-rtdb.firebaseio.com",
  projectId: "fuchsia-web-e1ffe",
  storageBucket: "fuchsia-web-e1ffe.firebasestorage.app",
  messagingSenderId: "1036149958008",
  appId: "1:1036149958008:web:673873d603b7fcbb29148d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allProducts = {};

// جلب المنتجات وعرضها
db.ref("products").on("value", (snapshot) => {
    allProducts = snapshot.val() || {};
    const tbody = document.getElementById("productTable");
    tbody.innerHTML = "";
    Object.keys(allProducts).forEach(id => {
        const p = allProducts[id];
        tbody.innerHTML += `
            <tr>
                <td>${p.name}</td>
                <td>${p.price} ج.م</td>
                <td class="${p.stock < 5 ? 'stock-low' : ''}">${p.stock}</td>
                <td><button style="background:#dc3545" onclick="deleteProduct('${id}')">حذف 🗑️</button></td>
            </tr>`;
    });
});

// دالة الحفظ (تحديث لو موجود / إضافة لو جديد)
async function saveProduct(name, price, stock) {
    const pName = name || document.getElementById("pName").value.trim();
    const pPrice = price || parseFloat(document.getElementById("pPrice").value);
    const pStock = stock || parseInt(document.getElementById("pStock").value);

    if (!pName || isNaN(pPrice) || isNaN(pStock)) return;

    let existingId = null;
    Object.keys(allProducts).forEach(id => {
        if (allProducts[id].name.toLowerCase() === pName.toLowerCase()) {
            existingId = id;
        }
    });

    if (existingId) {
        let newStock = allProducts[existingId].stock + pStock;
        await db.ref("products/" + existingId).update({ price: pPrice, stock: newStock });
    } else {
        await db.ref("products").push({ name: pName, price: pPrice, stock: pStock });
    }
    
    // تصفير الخانات لو الإضافة يدوية
    if(!name) {
        document.getElementById("pName").value = "";
        document.getElementById("pPrice").value = "";
        document.getElementById("pStock").value = "";
    }
}

// دالة استيراد الإكسيل
function importExcel() {
    const file = document.getElementById("excelFile").files[0];
    if (!file) return alert("اختار ملف إكسيل الأول!");

    const reader = new FileReader();
    reader.onload = async (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheetName = workbook.SheetNames[0];
        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

        for (let row of rows) {
            // تأكد إن أسماء الأعمدة في الإكسيل هي (الاسم، السعر، الكمية) أو (name, price, stock)
            const name = row.الاسم || row.name;
            const price = row.السعر || row.price;
            const stock = row.الكمية || row.stock;
            
            if (name) await saveProduct(name.toString(), parseFloat(price), parseInt(stock));
        }
        alert("تم استيراد البيانات وتحديث المخزن بنجاح! ✅");
    };
    reader.readAsArrayBuffer(file);
}

function deleteProduct(id) {
    if (confirm("حذف المنتج؟")) db.ref("products/" + id).remove();
}
</script>
</body>
</html>
