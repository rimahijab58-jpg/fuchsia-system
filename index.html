<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة فوشيا - الربط السحابي</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* تنسيق بسيط للتأكد من المظهر */
        body { font-family: Arial, sans-serif; padding: 20px; }
        .invoice { max-width: 800px; margin: auto; border: 1px solid #ddd; padding: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .no-print { margin-top: 20px; }
        select, input { padding: 8px; margin: 5px; width: 200px; }
        .btn-add { background: #007bff; color: white; border: none; cursor: pointer; padding: 10px 20px; }
        .btn-save { background: #28a745; color: white; border: none; cursor: pointer; padding: 15px; width: 100%; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="no-print-nav" style="text-align: center; margin-bottom: 20px;">
    <a href="index.html">🧾 الفاتورة</a> | 
    <a href="products.html">📦 المخزن (المنتجات)</a>
</div>

<div class="invoice">
    <h2 style="text-align: center;">🧾 نظام فواتير فوشيا السحابي</h2>

    <div class="no-print" style="background: #f0f4f8; padding: 15px; border-radius: 8px;">
        <label>اختر المنتج:</label>
        <select id="productSelect">
            <option value="">جاري تحميل الأصناف...</option>
        </select>
        
        <label>الكمية:</label>
        <input type="number" id="qty" value="1" min="1">
        
        <button class="btn-add" onclick="addToInvoice()">إضافة الصنف للفاتورة ➕</button>
    </div>

    <table id="invoiceTable">
        <thead>
            <tr style="background: #eee;">
                <th>المنتج</th>
                <th>السعر</th>
                <th>الكمية</th>
                <th>الإجمالي</th>
                <th class="no-print">إجراء</th>
            </tr>
        </thead>
        <tbody id="invoiceBody">
            </tbody>
    </table>

    <div style="margin-top: 20px; text-align: right;">
        <h3 style="color: #d9534f;">الإجمالي النهائي: <span id="finalTotal">0</span> ج.م</h3>
    </div>

    <button onclick="processAndPrint()" class="btn-save no-print">حفظ وخصم من المخزن السحابي وطباعة ✅</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// 1. بيانات الربط الخاصة بك (تأكد أنها نفس التي في صفحة المنتجات)
const firebaseConfig = {
  apiKey: "AIzaSyB" + "...", // يفضل نسخ المفتاح كاملاً من Firebase
  authDomain: "fuchsia-web-e1ffe.firebaseapp.com",
  databaseURL: "https://fuchsia-web-e1ffe-default-rtdb.firebaseio.com",
  projectId: "fuchsia-web-e1ffe",
  storageBucket: "fuchsia-web-e1ffe.appspot.com",
  messagingSenderId: "1036149958008",
  appId: "1:1036149958008:web:673873d603b7fcbb29148d"
};

// تشغيل Firebase
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();

let cloudProducts = {}; // لتخزين بيانات المخزن
let invoiceItems = []; // لتخزين عناصر الفاتورة الحالية

// 2. جلب المنتجات من السحاب وتحديث القائمة
db.ref("products").on("value", (snapshot) => {
    cloudProducts = snapshot.val() || {};
    const select = document.getElementById("productSelect");
    if (!select) return;
    
    select.innerHTML = '<option value="">-- اختر صنف --</option>';
    Object.keys(cloudProducts).forEach(id => {
        let p = cloudProducts[id];
        select.innerHTML += `<option value="${id}">${p.name} (المتاح: ${p.stock})</option>`;
    });
});

// 3. دالة إضافة صنف للفاتورة
function addToInvoice() {
    const select = document.getElementById("productSelect");
    const qtyInput = document.getElementById("qty");
    const productId = select.value;
    const qty = parseInt(qtyInput.value);

    if (!productId || qty <= 0) {
        alert("يرجى اختيار منتج وكمية صحيحة");
        return;
    }

    const product = cloudProducts[productId];

    // التأكد من توفر كمية
    if (qty > product.stock) {
        alert("الكمية المطلوبة غير متوفرة في المخزن السحابي!");
        return;
    }

    // إضافة المنتج للقائمة
    invoiceItems.push({
        id: productId,
        name: product.name,
        price: product.price,
        qty: qty,
        total: product.price * qty
    });

    renderTable();
    qtyInput.value = 1; // إعادة تعيين الكمية لـ 1
}

// 4. رسم جدول الفاتورة
function renderTable() {
    const tbody = document.getElementById("invoiceBody");
    const totalDisp = document.getElementById("finalTotal");
    tbody.innerHTML = "";
    let grandTotal = 0;

    invoiceItems.forEach((item, index) => {
        grandTotal += item.total;
        tbody.innerHTML += `
            <tr>
                <td>${item.name}</td>
                <td>${item.price}</td>
                <td>${item.qty}</td>
                <td>${item.total}</td>
                <td class="no-print"><button onclick="removeItem(${index})" style="color:red; cursor:pointer;">X</button></td>
            </tr>
        `;
    });
    totalDisp.innerText = grandTotal;
}

function removeItem(index) {
    invoiceItems.splice(index, 1);
    renderTable();
}

// 5. حفظ العملية وخصم المخزن
async function processAndPrint() {
    if (invoiceItems.length === 0) {
        alert("الفاتورة فارغة!");
        return;
    }

    if (!confirm("هل تريد إتمام البيع وخصم الكميات من السحاب؟")) return;

    try {
        for (let item of invoiceItems) {
            let currentStock = cloudProducts[item.id].stock;
            let newStock = currentStock - item.qty;

            // تحديث السحاب فوراً
            await db.ref("products/" + item.id).update({
                stock: newStock
            });
        }

        alert("تم الخصم من المخزن السحابي بنجاح!");
        window.print(); // فتح نافذة الطباعة
        
        // تصفير الفاتورة
        invoiceItems = [];
        renderTable();

    } catch (error) {
        alert("حدث خطأ في الاتصال بالسحاب!");
        console.error(error);
    }
}
</script>
</body>
</html>
