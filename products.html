<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فوشيا - إدارة المخزن الشاملة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .nav { margin-bottom: 20px; }
        .nav a { text-decoration: none; color: #7209b7; margin: 0 10px; font-weight: bold; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-group { background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-save { background: #28a745; }
        .btn-excel { background: #1d6f42; }
        .btn-edit { background: #ffc107; color: #000; margin-left: 5px; }
        .btn-delete { background: #dc3545; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #7209b7; color: white; }
        .excel-section { border-top: 2px dashed #7209b7; padding-top: 15px; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="nav">
    <a href="index.html">🧾 الفاتورة</a> | <a href="history.html">📊 التقارير</a>
</div>

<div class="container">
    <h1>📦 إدارة مخزن فوشيا</h1>

    <div class="input-group">
        <input type="hidden" id="editKey"> <input type="text" id="pName" placeholder="اسم المنتج">
        <input type="number" id="pPrice" placeholder="السعر">
        <input type="number" id="pStock" placeholder="الكمية">
        <button class="btn-save" id="saveBtn" onclick="saveProduct()">حفظ المنتج ✅</button>
        <button id="cancelBtn" style="background:#6c757d; display:none;" onclick="resetForm()">إلغاء</button>
    </div>

    <div class="excel-section">
        <strong>📥 استيراد من إكسيل: </strong>
        <input type="file" id="excelFile" accept=".xlsx, .xls">
        <button class="btn-excel" onclick="importExcel()">رفع الملف 📁</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>الاسم</th>
                <th>السعر</th>
                <th>المخزن</th>
                <th>إجراءات</th>
            </tr>
        </thead>
        <tbody id="productTable"></tbody>
    </table>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCcd740Bwq4XRrMzVPVqI-G4SmpzvCNqlU",
  authDomain: "fuchsia-web-e1ffe.firebaseapp.com",
  databaseURL: "https://fuchsia-web-e1ffe-default-rtdb.firebaseio.com",
  projectId: "fuchsia-web-e1ffe",
  storageBucket: "fuchsia-web-e1ffe.firebasestorage.app",
  messagingSenderId: "1036149958008",
  appId: "1:1036149958008:web:673873d603b7fcbb29148d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allProducts = {};

// عرض المنتجات
db.ref("products").on("value", (snapshot) => {
    allProducts = snapshot.val() || {};
    const tbody = document.getElementById("productTable");
    tbody.innerHTML = "";
    Object.keys(allProducts).forEach(id => {
        const p = allProducts[id];
        tbody.innerHTML += `
            <tr>
                <td>${p.name}</td>
                <td>${p.price} ج.م</td>
                <td>${p.stock}</td>
                <td>
                    <button class="btn-edit" onclick="editProduct('${id}')">تعديل 📝</button>
                    <button class="btn-delete" onclick="deleteProduct('${id}')">حذف 🗑️</button>
                </td>
            </tr>`;
    });
});

// حفظ أو تحديث المنتج
async function saveProduct() {
    const editKey = document.getElementById("editKey").value;
    const name = document.getElementById("pName").value.trim();
    const price = parseFloat(document.getElementById("pPrice").value);
    const stock = parseInt(document.getElementById("pStock").value);

    if (!name || isNaN(price) || isNaN(stock)) return alert("يرجى ملء كافة البيانات");

    if (editKey) {
        // حالة التعديل لمنتج موجود (تعديل مباشر)
        await db.ref("products/" + editKey).update({ name, price, stock });
        alert("تم تعديل المنتج بنجاح!");
    } else {
        // حالة الإضافة (مع فحص التكرار لزيادة الكمية)
        let existingId = null;
        Object.keys(allProducts).forEach(id => {
            if (allProducts[id].name.toLowerCase() === name.toLowerCase()) existingId = id;
        });

        if (existingId) {
            let newStock = allProducts[existingId].stock + stock;
            await db.ref("products/" + existingId).update({ price, stock: newStock });
            alert("الصنف موجود.. تم زيادة الكمية بنجاح!");
        } else {
            await db.ref("products").push({ name, price, stock });
            alert("تم إضافة منتج جديد!");
        }
    }
    resetForm();
}

// تحضير الخانات للتعديل
function editProduct(id) {
    const p = allProducts[id];
    document.getElementById("editKey").value = id;
    document.getElementById("pName").value = p.name;
    document.getElementById("pPrice").value = p.price;
    document.getElementById("pStock").value = p.stock;
    document.getElementById("saveBtn").innerText = "تحديث البيانات 🔄";
    document.getElementById("cancelBtn").style.display = "inline-block";
}

function resetForm() {
    document.getElementById("editKey").value = "";
    document.getElementById("pName").value = "";
    document.getElementById("pPrice").value = "";
    document.getElementById("pStock").value = "";
    document.getElementById("saveBtn").innerText = "حفظ المنتج ✅";
    document.getElementById("cancelBtn").style.display = "none";
}

// استيراد إكسيل
function importExcel() {
    const file = document.getElementById("excelFile").files[0];
    if (!file) return alert("اختار ملف!");
    const reader = new FileReader();
    reader.onload = async (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
        for (let row of rows) {
            const name = (row.الاسم || row.name || "").toString();
            const price = parseFloat(row.السعر || row.price || 0);
            const stock = parseInt(row.الكمية || row.stock || 0);
            if (name) {
                let existId = null;
                Object.keys(allProducts).forEach(id => {
                    if (allProducts[id].name.toLowerCase() === name.toLowerCase()) existId = id;
                });
                if (existId) {
                    await db.ref("products/" + existId).update({ stock: allProducts[existId].stock + stock, price });
                } else {
                    await db.ref("products").push({ name, price, stock });
                }
            }
        }
        alert("تم استيراد الملف وتحديث المخزن!");
    };
    reader.readAsArrayBuffer(file);
}

function deleteProduct(id) {
    if (confirm("حذف المنتج؟")) db.ref("products/" + id).remove();
}
</script>
</body>
</html>
