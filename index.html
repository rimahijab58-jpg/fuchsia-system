<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUCHSIA POS - فوشيا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4b0082;
            --return-color: #d9534f;
            --bg-gray: #f4f7f6;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background-color: #e2e8f0; 
            margin: 0; 
            padding: 5px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0; }
            .container { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; padding: 10px !important; }
        }

        /* Nav & Style - No Changes to Top Part */
        .nav-container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .nav-bar {
            background: #ffffff;
            padding: 10px;
            border-radius: 15px;
            display: flex;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            align-items: center;
            width: 100%;
            justify-content: space-around;
        }

        .nav-item {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 13px;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            border: none;
            background: none;
        }

        .btn-return-toggle { 
            background: #333; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
        }

        .container { 
            width: 100%;
            max-width: 650px; 
            background: white; 
            padding: 15px; 
            border: 2px solid #000; 
            position: relative;
        }

        .receipt-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 15px;
            margin-bottom: 20px;
            gap: 15px;
        }

        @media (min-width: 480px) {
            .receipt-header {
                display: grid;
                grid-template-columns: 1.5fr 1fr 1.2fr;
                text-align: inherit;
                align-items: start;
            }
        }

        .brand-section h1 { margin: 0; font-size: 35px; font-weight: 900; color: var(--primary-color); }
        .shop-info { font-size: 12px; font-weight: bold; line-height: 1.5; }
        .qr-section img { width: 80px; height: 80px; }
        .invoice-info { font-size: 12px; font-weight: bold; width: 100%; }

        .input-box { background: #fcfcfc; border: 1px dashed #bbb; padding: 12px; margin-bottom: 15px; border-radius: 10px; position: relative; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; text-align: center; font-size: 16px; }

        #searchResult { 
            position: absolute; width: calc(100% - 24px); background: white; border: 1px solid #ddd; 
            z-index: 1000; display: none; max-height: 200px; overflow-y: auto; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-radius: 8px; top: 60px;
        }
        .search-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; text-align: right; display: flex; justify-content: space-between; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; border: 1px solid #000; padding: 8px; font-size: 13px; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; font-size: 13px; }

        .total-box { 
            margin-top: 20px; padding: 15px; border-top: 2px solid #000; border-bottom: 2px solid #000;
            font-size: 24px; color: #d9534f; font-weight: 900; text-align: center; 
        }

        .google-search-box {
            margin-top: 25px; border: 1px solid #dfe1e5; border-radius: 24px; padding: 8px 15px;
            display: flex; align-items: center; justify-content: space-between; background: #fff;
        }

        .btn-save-print { 
            background: #28a745; color: white; border: none; padding: 15px; width: 100%; 
            border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        #customAlert {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 20px; border-radius: 25px; z-index: 9999;
        }

        /* مؤشر حالة الاتصال */
        #statusIndicator {
            font-size: 10px; text-align: center; color: gray; margin-bottom: 5px;
        }
    </style>
</head>
<body id="bodyTag">

    <div id="statusIndicator">جاري التحقق من الاتصال بالخادم...</div>
    <div id="customAlert"></div>

    <div class="nav-container no-print">
        <div class="nav-bar">
            <button class="nav-item" onclick="location.reload()"><span>🏠</span><span>الرئيسية</span></button>
            <button class="nav-item" onclick="window.location.href='products.html'"><span>📦</span><span>المخزن</span></button>
            <button class="nav-item" onclick="window.location.href='history.html'"><span>📊</span><span>السجل</span></button>
        </div>
        <button id="modeBtn" class="btn-return-toggle" onclick="toggleReturn()">
            🔄 وضع البيع الحالي
        </button>
    </div>

    <div class="container" id="invoice">
        <header class="receipt-header">
            <div class="brand-section">
                <h1>فـوشـيـا</h1>
                <div class="shop-info">
                    طرحة - خمار - زي شرعي<br>
                    سمسطا - شارع بور سعيد<br>
                    واتساب: 01287863711
                </div>
            </div>
            <div class="qr-section">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://wa.me/201287863711" alt="QR">
            </div>
            <div class="invoice-info">
                <p>رقم الفاتورة: <span id="invNum">0000</span></p>
                <p>التاريخ: <span id="invDate">--/--/----</span></p>
                <p>العميل: Cash Customer</p>
            </div>
        </header>

        <div class="input-box no-print">
            <input type="text" id="pSearch" placeholder="ابحث عن المنتج..." autocomplete="off">
            <div id="searchResult"></div>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="pPrice" placeholder="السعر">
                <input type="number" id="pQty" value="1" placeholder="الكمية">
            </div>
            <button onclick="addItem()" style="width:100%; padding:14px; background:var(--primary-color); color:white; border:none; border-radius:8px; cursor:pointer; font-weight: 900;">إضافة +</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>الصنف</th>
                    <th>سعر</th>
                    <th>كمية</th>
                    <th>إجمالي</th>
                    <th class="no-print">إجراء</th>
                </tr>
            </thead>
            <tbody id="invoiceBody"></tbody>
        </table>

        <div class="total-box">
            الإجمالي: <span id="finalTotal">0</span> ج.م
        </div>

        <div class="google-search-box">
            <div class="google-logo">
                <span style="color: #4285F4;">G</span><span style="color: #EA4335;">o</span><span style="color: #FBBC05;">o</span><span style="color: #4285F4;">g</span><span style="color: #34A853;">l</span><span style="color: #EA4335;">e</span>
            </div>
            <span>فوشيا سمسطا</span>
            <span>🔍</span>
        </div>

        <button class="btn-save-print no-print" onclick="finish()">
            ✅ حفظ وطباعة الفاتورة
        </button>
    </div>

    <!-- استخدام الإصدار الأحدث من Firebase (Modular) بأسلوب التوافق -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, orderByKey, limitToLast, query, get } 
        from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcd740Bwq4XRrMzVPVqI-G4SmpzvCNqlU",
            databaseURL: "https://fuchsia-web-e1ffe-default-rtdb.firebaseio.com",
            projectId: "fuchsia-web-e1ffe"
        };

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // متغيرات الحالة
        let cloudProducts = {};
        let items = [];
        let isReturn = false;
        let selectedId = null;

        // 1. فحص الاتصال
        const statusEl = document.getElementById('statusIndicator');
        const connectedRef = ref(db, ".info/connected");
        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                statusEl.innerText = "🟢 متصل بقاعدة البيانات";
                statusEl.style.color = "green";
            } else {
                statusEl.innerText = "🔴 غير متصل - تحقق من الإنترنت";
                statusEl.style.color = "red";
            }
        });

        // 2. جلب التاريخ ورقم الفاتورة
        document.getElementById('invDate').innerText = new Date().toLocaleDateString('ar-EG');
        
        const historyRef = query(ref(db, "history"), orderByKey(), limitToLast(1));
        onValue(historyRef, (snapshot) => {
            let nextNum = 1001;
            if (snapshot.exists()) {
                const data = snapshot.val();
                const lastKey = Object.keys(data)[0];
                nextNum = parseInt(data[lastKey].invoiceNum) + 1;
            }
            document.getElementById('invNum').innerText = nextNum;
        });

        // 3. مزامنة المنتجات للبحث
        onValue(ref(db, "products"), (snapshot) => {
            cloudProducts = snapshot.val() || {};
        });

        // 4. نظام البحث
        const searchInput = document.getElementById("pSearch");
        const resBox = document.getElementById("searchResult");
        
        searchInput.oninput = () => {
            const val = searchInput.value.trim().toLowerCase();
            resBox.innerHTML = "";
            if (!val) { resBox.style.display = "none"; return; }

            Object.keys(cloudProducts).forEach(id => {
                const p = cloudProducts[id];
                if (p.name.toLowerCase().includes(val)) {
                    const d = document.createElement("div");
                    d.className = "search-item";
                    d.innerHTML = `<span>${p.name}</span> <small>(${p.stock})</small>`;
                    d.onclick = () => {
                        selectedId = id;
                        searchInput.value = p.name;
                        document.getElementById("pPrice").value = p.price;
                        resBox.style.display = "none";
                        document.getElementById("pQty").focus();
                    };
                    resBox.appendChild(d);
                }
            });
            resBox.style.display = resBox.innerHTML ? "block" : "none";
        };

        // 5. وظائف الفاتورة
        window.addItem = () => {
            const name = searchInput.value;
            const price = parseFloat(document.getElementById("pPrice").value);
            const qty = parseInt(document.getElementById("pQty").value);

            if (!name || isNaN(price) || qty <= 0) {
                showAlert("بيانات غير مكتملة");
                return;
            }

            items.push({ id: selectedId, name, price, qty, total: price * qty });
            render();
            
            // تنظيف المدخلات
            searchInput.value = ""; 
            document.getElementById("pPrice").value = ""; 
            document.getElementById("pQty").value = "1";
            selectedId = null;
        };

        function render() {
            const body = document.getElementById("invoiceBody");
            let total = 0;
            body.innerHTML = "";
            items.forEach((item, index) => {
                total += item.total;
                body.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.price}</td>
                        <td>${item.qty}</td>
                        <td>${item.total}</td>
                        <td class="no-print"><button onclick="removeItem(${index})">❌</button></td>
                    </tr>
                `;
            });
            document.getElementById("finalTotal").innerText = total;
        }

        window.removeItem = (i) => { items.splice(i, 1); render(); };

        window.toggleReturn = () => {
            isReturn = !isReturn;
            const btn = document.getElementById("modeBtn");
            btn.innerText = isReturn ? "🔄 وضع المرتجع (إرجاع)" : "🔄 وضع البيع الحالي";
            btn.style.background = isReturn ? "var(--return-color)" : "#333";
            document.getElementById("bodyTag").style.backgroundColor = isReturn ? "#fff0f0" : "#e2e8f0";
        };

        window.finish = async () => {
            if (items.length === 0) return showAlert("الفاتورة فارغة");
            
            try {
                // تحديث المخزون
                for (let item of items) {
                    if (item.id && cloudProducts[item.id]) {
                        let currentStock = parseInt(cloudProducts[item.id].stock);
                        let newStock = isReturn ? (currentStock + item.qty) : (currentStock - item.qty);
                        await update(ref(db, `products/${item.id}`), { stock: newStock });
                    }
                }

                // حفظ في السجل
                const total = items.reduce((a, b) => a + b.total, 0);
                await push(ref(db, "history"), {
                    invoiceNum: document.getElementById('invNum').innerText,
                    date: new Date().toLocaleDateString('en-CA'),
                    total: isReturn ? -total : total,
                    type: isReturn ? "return" : "sale",
                    items: items
                });

                showAlert("تم الحفظ! جاري الطباعة...");
                setTimeout(() => { window.print(); location.reload(); }, 1000);
            } catch (err) {
                showAlert("خطأ في الحفظ: " + err.message);
            }
        };

        function showAlert(m) {
            const a = document.getElementById("customAlert");
            a.innerText = m; a.style.display = "block";
            setTimeout(() => a.style.display = "none", 3000);
        }
    </script>
</body>
</html>
