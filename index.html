<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUCHSIA POS - فوشيا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4b0082;
            --return-color: #d9534f;
            --bg-gray: #f4f7f6;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background-color: #e2e8f0; 
            margin: 0; 
            padding: 5px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .container { border: 1px solid #000 !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; padding: 10px !important; }
        }

        /* تحسينات الموبايل */
        .nav-container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .nav-bar {
            background: #ffffff;
            padding: 5px 10px;
            border-radius: 50px;
            display: flex;
            gap: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            align-items: center;
            width: 100%;
            justify-content: center;
        }

        .nav-item {
            text-decoration: none;
            color: #4b0082;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 14px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 20px;
            border: none;
            background: none;
            white-space: nowrap;
        }
        .nav-item:hover { background: #f0f0f0; }

        .btn-return-toggle { 
            background: #333; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
        }

        .container { 
            width: 100%;
            max-width: 650px; 
            background: white; 
            padding: 15px; 
            border: 2px solid #000; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            position: relative;
        }

        .google-search-box {
            margin-top: 25px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        }
        .google-search-box span { color: #5f6368; font-size: 12px; }
        .google-search-box .google-logo { font-weight: bold; font-size: 16px; }

        /* تعديل الهيدر للموبايل */
        .receipt-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 15px;
            margin-bottom: 20px;
            gap: 15px;
        }

        @media (min-width: 480px) {
            .receipt-header {
                display: grid;
                grid-template-columns: 1.5fr 1fr 1.2fr;
                text-align: inherit;
                align-items: start;
            }
        }

        .brand-section h1 { margin: 0; font-size: 35px; font-weight: 900; }
        .shop-info { font-size: 12px; font-weight: bold; line-height: 1.5; }

        .qr-section img { width: 80px; height: 80px; }

        .invoice-info { font-size: 12px; font-weight: bold; width: 100%; }
        .invoice-info p { margin: 5px 0; }

        .input-box { background: #fcfcfc; border: 1px dashed #bbb; padding: 12px; margin-bottom: 15px; border-radius: 10px; position: relative; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; text-align: center; font-size: 16px; }

        #searchResult { 
            position: absolute; width: calc(100% - 24px); background: white; border: 1px solid #ddd; 
            z-index: 1000; display: none; max-height: 200px; overflow-y: auto; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-radius: 8px; top: 60px;
        }
        .search-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; text-align: right; display: flex; justify-content: space-between; font-size: 14px; }

        /* جعل الجدول قابل للتمرير على الموبايل */
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th { background: #f8f9fa; border: 1px solid #000; padding: 8px; font-size: 13px; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; font-size: 13px; }

        .total-box { 
            margin-top: 20px; padding: 15px; border-top: 2px solid #000; border-bottom: 2px solid #000;
            font-size: 22px; color: #d9534f; font-weight: bold; text-align: center; 
        }

        .btn-save-print { 
            background: #28a745; color: white; border: none; padding: 15px; width: 100%; 
            border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        #customAlert {
            display: none; position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 8px 15px; border-radius: 20px; z-index: 9999; font-size: 14px;
        }
    </style>
</head>
<body id="bodyTag">

    <div id="customAlert">جاري المعالجة...</div>

    <div class="nav-container no-print">
        <div class="nav-bar">
            <button class="nav-item" onclick="location.reload()">🏠 فاتورة</button>
            <button class="nav-item" onclick="location.href='products.html'">📦 مخزن</button>
            <button class="nav-item" onclick="location.href='history.html'">📊 سجل</button>
        </div>
        <button class="btn-return-toggle" onclick="toggleReturn()">
            🔄 وضع المرتجع
        </button>
    </div>

    <div class="container" id="invoice">
        <header class="receipt-header">
            <div class="brand-section">
                <h1>فـوشـيـا</h1>
                <div class="shop-info">
                    طرحة - خمار - زي شرعي<br>
                    سمسطا - شارع بور سعيد<br>
                    واتساب: 01287863711
                </div>
            </div>
            <div class="qr-section">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://chat.whatsapp.com/EnzS1EbY5BfAl6rQsHqiPK?mode=gi_t" alt="QR">
            </div>
            <div class="invoice-info">
                <p>رقم الفاتورة: <span id="invNum">...</span></p>
                <p>التاريخ: <span id="invDate">---</span></p>
                <p>العميل: Cash Customer</p>
            </div>
        </header>

        <div class="input-box no-print">
            <input type="text" id="pSearch" placeholder="ابحث عن المنتج..." autocomplete="off">
            <div id="searchResult"></div>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="pPrice" placeholder="السعر">
                <input type="number" id="pQty" value="1" placeholder="الكمية">
            </div>
            <button onclick="addItem()" style="width:100%; padding:12px; background:#4b0082; color:white; border:none; border-radius:8px; cursor:pointer; font-weight: bold;">إضافة +</button>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>الصنف</th>
                        <th>سعر</th>
                        <th>كمية</th>
                        <th>إجمالي</th>
                        <th class="no-print">حذف</th>
                    </tr>
                </thead>
                <tbody id="invoiceBody"></tbody>
            </table>
        </div>

        <div class="total-box">
            الإجمالي: <span id="finalTotal">0</span> ج.م
        </div>

        <div style="text-align: center; margin-top: 15px; font-weight: bold; font-size: 14px;">
            شكراً لزيارتكم -- شرفتمونا
        </div>

        <div class="google-search-box">
            <div class="google-logo">
                <span style="color: #4285F4;">G</span><span style="color: #EA4335;">o</span><span style="color: #FBBC05;">o</span><span style="color: #4285F4;">g</span><span style="color: #34A853;">l</span><span style="color: #EA4335;">e</span>
            </div>
            <span>فوشيا سمسطا</span>
            <span style="font-size: 16px;">🔍</span>
        </div>

        <button class="btn-save-print no-print" onclick="finish()">
            ✅ حفظ وطباعة الفاتورة
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcd740Bwq4XRrMzVPVqI-G4SmpzvCNqlU",
            databaseURL: "https://fuchsia-web-e1ffe-default-rtdb.firebaseio.com",
            projectId: "fuchsia-web-e1ffe",
            appId: "1:1036149958008:web:673873d603b7fcbb29148d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cloudProducts = {}, items = [], isReturn = false, selectedId = null;

        document.getElementById('invDate').innerText = new Date().toLocaleDateString('en-CA');

        db.ref("history").orderByKey().limitToLast(1).once("value", s => {
            let nextNum = 1001;
            if(s.exists()){
                const lastKey = Object.keys(s.val())[0];
                const lastInv = s.val()[lastKey];
                if(lastInv.invoiceNum) nextNum = parseInt(lastInv.invoiceNum) + 1;
            }
            document.getElementById('invNum').innerText = nextNum;
        });

        db.ref("products").on("value", s => { cloudProducts = s.val() || {}; });

        const pSearchInput = document.getElementById("pSearch");
        const resBox = document.getElementById("searchResult");
        const priceInput = document.getElementById("pPrice");
        const qtyInput = document.getElementById("pQty");

        pSearchInput.oninput = function() {
            const val = this.value.trim().toLowerCase();
            resBox.innerHTML = "";
            if(!val) { resBox.style.display="none"; return; }
            
            Object.keys(cloudProducts).forEach(id => {
                const p = cloudProducts[id];
                if(p.name.toLowerCase().includes(val)) {
                    let d = document.createElement("div");
                    d.className="search-item";
                    d.innerHTML = `<span>${p.name}</span> <b style="color: #888;">(${p.stock})</b>`;
                    d.onclick = () => {
                        selectedId = id;
                        pSearchInput.value = p.name;
                        priceInput.value = p.price;
                        resBox.style.display = "none";
                        qtyInput.focus();
                    };
                    resBox.appendChild(d);
                }
            });
            resBox.style.display = resBox.innerHTML ? "block" : "none";
        };

        function showNotice(msg) {
            const a = document.getElementById('customAlert');
            a.innerText = msg; a.style.display = 'block';
            setTimeout(() => a.style.display = 'none', 2000);
        }

        function addItem() {
            const name = pSearchInput.value.trim();
            const price = parseFloat(priceInput.value);
            const qty = parseInt(qtyInput.value);

            if(!name || isNaN(price) || isNaN(qty) || qty <= 0) {
                showNotice("أكمل البيانات");
                return;
            }

            items.push({ id: selectedId, name: name, price: price, qty: qty, total: price * qty });
            render();
            pSearchInput.value = ""; priceInput.value = ""; qtyInput.value = "1"; selectedId = null;
            pSearchInput.focus();
        }

        function render() {
            const b = document.getElementById('invoiceBody');
            let t = 0; b.innerHTML = "";
            items.forEach((it, i) => {
                t += it.total;
                b.innerHTML += `
                <tr>
                    <td>${it.name}</td>
                    <td>${it.price.toFixed(2)}</td>
                    <td>${it.qty}</td>
                    <td>${it.total.toFixed(2)}</td>
                    <td class="no-print">
                        <button style="background:none; border:none; cursor:pointer;" onclick="items.splice(${i},1);render()">❌</button>
                    </td>
                </tr>`;
            });
            document.getElementById('finalTotal').innerText = t.toLocaleString('ar-EG');
        }

        function toggleReturn() {
            isReturn = !isReturn;
            document.getElementById('bodyTag').style.backgroundColor = isReturn ? '#fff0f0' : '#e2e8f0';
            showNotice(isReturn ? "وضع المرتجع" : "وضع البيع");
        }

        async function finish() {
            if(items.length === 0) return showNotice("الفاتورة فارغة!");
            try {
                for(let item of items) {
                    if(item.id && cloudProducts[item.id]) {
                        let newStock = isReturn ? (cloudProducts[item.id].stock + item.qty) : (cloudProducts[item.id].stock - item.qty);
                        await db.ref("products/" + item.id).update({ stock: newStock });
                    }
                }
                let totalVal = items.reduce((a, b) => a + b.total, 0);
                let invNumber = document.getElementById('invNum').innerText;
                await db.ref("history").push({
                    invoiceNum: invNumber,
                    date: new Date().toLocaleDateString('en-CA'),
                    time: new Date().toLocaleTimeString('ar-EG'),
                    total: isReturn ? -totalVal : totalVal,
                    type: isReturn ? "return" : "sale",
                    items: items
                });
                setTimeout(() => { window.print(); location.reload(); }, 500);
            } catch(e) { showNotice("خطأ في الشبكة!"); }
        }
    </script>
</body>
</html>
