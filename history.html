<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فوشيا - تقارير المبيعات</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .chart-container { background: white; margin: 20px auto; padding: 20px; max-width: 800px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav a { text-decoration: none; color: #d9534f; margin: 0 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">🧾 العودة للفاتورة</a>
    </div>
    <h1>📊 تحليلات مبيعات فوشيا</h1>
    
    <div class="chart-container">
        <h3>المبيعات اليومية (آخر 7 أيام)</h3>
        <canvas id="dailyChart"></canvas>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCcd740Bwq4XRrMzVPVqI-G4SmpzvCNqlU",
          authDomain: "fuchsia-web-e1ffe.firebaseapp.com",
          databaseURL: "https://fuchsia-web-e1ffe-default-rtdb.firebaseio.com",
          projectId: "fuchsia-web-e1ffe",
          storageBucket: "fuchsia-web-e1ffe.firebasestorage.app",
          messagingSenderId: "1036149958008",
          appId: "1:1036149958008:web:673873d603b7fcbb29148d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref("history").on("value", snapshot => {
            const data = snapshot.val() || {};
            const dailyTotals = {};
            
            Object.values(data).forEach(sale => {
                dailyTotals[sale.date] = (dailyTotals[sale.date] || 0) + parseFloat(sale.total);
            });

            const labels = Object.keys(dailyTotals).sort().slice(-7);
            const values = labels.map(l => dailyTotals[l]);

            new Chart(document.getElementById('dailyChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ label: 'إجمالي المبيعات (ج.م)', data: values, backgroundColor: '#f72585' }]
                }
            });
        });
    </script>
</body>
</html>
