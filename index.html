<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FUCHSIA POS - فوشيا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4b0082;
            --return-color: #d9534f;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Cairo', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background-color: #f1f5f9; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        /* شاشة القفل التأمينية */
        #lockScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary-color); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; padding: 20px;
        }
        .lock-box { background: white; padding: 30px; border-radius: 20px; text-align: center; color: #333; width: 100%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .lock-box h2 { margin-top: 0; color: var(--primary-color); }
        .lock-box input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 24px; text-align: center; margin-bottom: 15px; letter-spacing: 5px; }
        .lock-box button { background: var(--primary-color); color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .container { 
            width: 100%;
            max-width: 480px; 
            background: white; 
            padding: 15px; 
            border: 1px solid #ddd; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
            display: none; /* مخفي حتى إدخال الكود */
        }

        /* تعديلات الطباعة لمنع الصفحة الفارغة */
        @media print {
            @page { 
                margin: 0; 
                size: auto; 
            }
            body { 
                background: white; 
                padding: 0; 
                margin: 0; 
                width: 100%; 
                overflow: hidden; 
            }
            .no-print { display: none !important; }
            .container { 
                display: block !important;
                border: none !important; 
                width: 100% !important; 
                max-width: 100% !important; 
                padding: 5mm !important; 
                box-shadow: none !important;
                margin: 0 !important;
            }
            #lockScreen { display: none !important; }
            .qr-small { width: 18mm !important; height: 18mm !important; }
            .brand-name { font-size: 18pt !important; }
            th, td { font-size: 9pt !important; padding: 4pt !important; }
            .total-box { font-size: 16pt !important; margin: 3mm 0 !important; padding: 2mm !important; }
            .receipt-header { border-bottom-width: 1.5pt !important; margin-bottom: 5mm !important; }
        }

        /* الناف بار */
        .nav-container { width: 100%; max-width: 480px; margin-bottom: 10px; display: none; }
        .nav-bar {
            background: #ffffff;
            padding: 8px;
            border-radius: 12px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 8px;
        }
        .nav-item { border: none; background: none; color: var(--primary-color); font-weight: 900; font-size: 14px; cursor: pointer; text-decoration: none; }
        .btn-return-toggle { 
            background: #333; color: white; border: none; padding: 12px; border-radius: 12px; 
            cursor: pointer; font-weight: bold; width: 100%; font-size: 15px;
        }

        /* الهيدر المطور */
        .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        .header-col { flex: 1; display: flex; flex-direction: column; }
        .col-right { text-align: right; }
        .col-center { text-align: center; align-items: center; }
        .col-left { text-align: left; font-size: 11px; font-weight: bold; line-height: 1.4; }

        .brand-name { color: var(--primary-color); font-size: 22px; font-weight: 900; margin: 0; line-height: 1; }
        .shop-desc { font-size: 10px; font-weight: bold; margin-top: 2px; color: #444; }
        
        .qr-small { 
            width: 60px; 
            height: 60px; 
            border: 1px solid #eee; 
            padding: 2px; 
            background: #fff;
        }

        .input-box { background: #f8fafc; border: 1px dashed #cbd5e1; padding: 12px; margin-bottom: 12px; border-radius: 10px; position: relative; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 8px; text-align: center; font-size: 14px; }
        
        #searchResult { 
            position: absolute; width: calc(100% - 24px); background: white; border: 1px solid #ddd; 
            z-index: 1000; display: none; max-height: 200px; overflow-y: auto; border-radius: 8px;
            top: 55px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 13px; }

        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th { background: #f1f5f9; border: 1px solid #000; padding: 6px; font-weight: 900; font-size: 13px; }
        td { border: 1px solid #000; padding: 6px; text-align: center; font-weight: bold; font-size: 13px; }

        .total-box { 
            margin: 12px 0; padding: 8px; border-top: 2px solid #000; border-bottom: 2px solid #000;
            font-size: 22px; color: #b91c1c; font-weight: 900; text-align: center; 
        }

        .footer-msg { text-align: center; margin-top: 8px; font-weight: bold; font-size: 12px; line-height: 1.4; }

        .google-box {
            margin-top: 10px; border: 1px solid #ddd; border-radius: 20px; padding: 5px 12px;
            display: flex; align-items: center; justify-content: space-between; font-size: 11px;
        }

        .btn-save { 
            background: #16a34a; color: white; border: none; padding: 14px; width: 100%; 
            border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }

        #customAlert {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: white; padding: 8px 20px; border-radius: 30px; z-index: 11000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-size: 14px;
        }
    </style>
</head>
<body id="bodyTag">

    <div id="customAlert"></div>

    <!-- شاشة التأمين -->
    <div id="lockScreen">
        <div class="lock-box">
            <h2>🔐 دخول آمن</h2>
            <p>برجاء إدخال الكود السري للاستمرار</p>
            <input type="password" id="pinInput" maxlength="4" placeholder="••••" inputmode="numeric">
            <button onclick="checkPin()">دخول</button>
        </div>
    </div>

    <div class="nav-container no-print" id="navMain">
        <div class="nav-bar">
            <button class="nav-item" onclick="location.reload()">🏠 جديد</button>
            <a href="products.html" class="nav-item">📦 المخزن</a>
            <a href="history.html" class="nav-item">📊 السجل</a>
        </div>
        <button class="btn-return-toggle" id="modeBtn" onclick="toggleReturn()">🔄 وضع البيع الحالي</button>
    </div>

    <div class="container" id="invoice">
        <header class="receipt-header">
            <div class="header-col col-right">
                <h1 class="brand-name">فـوشـيـا</h1>
                <div class="shop-desc">
                    طرحة - خمار - زي شرعي<br>
                    سمسطا - ش بورسعيد<br>
                    01287863711
                </div>
            </div>

            <div class="header-col col-center">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://chat.whatsapp.com/L8lYx6Y8f6f6f6f6f6f6f" class="qr-small" alt="WhatsApp">
                <div style="font-size: 8px; font-weight: bold; margin-top: 2px;">مجموعة الواتساب</div>
            </div>

            <div class="header-col col-left">
                رقم: <span id="invNum">...</span><br>
                تاريخ: <span id="invDate">...</span><br>
                العميل: نقدي
            </div>
        </header>

        <div class="input-box no-print">
            <input type="text" id="pSearch" placeholder="🔍 ابحث عن اسم الصنف..." autocomplete="off">
            <div id="searchResult"></div>
            <div style="display: flex; gap: 8px;">
                <input type="number" id="pPrice" placeholder="السعر">
                <input type="number" id="pQty" value="1" placeholder="الكمية">
            </div>
            <button onclick="addItem()" style="width:100%; padding:12px; background:var(--primary-color); color:white; border:none; border-radius:8px; font-weight:900; cursor:pointer;">إضافة +</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 45%;">الصنف</th>
                    <th>السعر</th>
                    <th>الكمية</th>
                    <th>الإجمالي</th>
                    <th class="no-print">❌</th>
                </tr>
            </thead>
            <tbody id="invoiceBody"></tbody>
        </table>

        <div class="total-box">
            الإجمالي: <span id="finalTotal">0</span> ج.م
        </div>

        <div class="footer-msg">
            شكراً لزيارتكم -- شرفتونا في فوشيا<br>
            
        </div>

        <div class="google-box">
            <div style="font-weight: bold;">
                <span style="color: #4285F4;">G</span><span style="color: #EA4335;">o</span><span style="color: #FBBC05;">o</span><span style="color: #4285F4;">g</span><span style="color: #34A853;">l</span><span style="color: #EA4335;">e</span>
            </div>
            <span style="color: #444; font-weight: bold;">فوشيا سمسطا</span>
            <span>🔍</span>
        </div>

        <button class="btn-save no-print" onclick="finish()">
            ✅ حفظ وطباعة الفاتورة
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const PIN_CODE = "2025"; // الكود السري (يمكنك تغييره من هنا)

        function checkPin() {
            const input = document.getElementById("pinInput").value;
            if(input === PIN_CODE) {
                document.getElementById("lockScreen").style.display = "none";
                document.getElementById("invoice").style.display = "block";
                document.getElementById("navMain").style.display = "block";
                sessionStorage.setItem("fuchsia_auth", "true");
            } else {
                showNotice("الكود غير صحيح!");
            }
        }

        // فحص حالة الدخول عند فتح الصفحة
        window.onload = function() {
            if(sessionStorage.getItem("fuchsia_auth") === "true") {
                document.getElementById("lockScreen").style.display = "none";
                document.getElementById("invoice").style.display = "block";
                document.getElementById("navMain").style.display = "block";
            }
        };

        const firebaseConfig = {
            apiKey: "AIzaSyCcd740Bwq4XRrMzVPVqI-G4SmpzvCNqlU",
            databaseURL: "https://fuchsia-web-e1ffe-default-rtdb.firebaseio.com",
            projectId: "fuchsia-web-e1ffe",
            appId: "1:1036149958008:web:673873d603b7fcbb29148d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cloudProducts = {}, items = [], isReturn = false, selectedId = null;

        document.getElementById('invDate').innerText = new Date().toLocaleDateString('ar-EG');

        db.ref("history").orderByKey().limitToLast(1).on("value", s => {
            let nextNum = 1001;
            if(s.exists()){
                const data = s.val();
                const lastKey = Object.keys(data)[0];
                nextNum = parseInt(data[lastKey].invoiceNum) + 1;
            }
            document.getElementById('invNum').innerText = nextNum;
        });

        db.ref("products").on("value", s => { cloudProducts = s.val() || {}; });

        const searchInput = document.getElementById("pSearch");
        const resBox = document.getElementById("searchResult");
        const priceInput = document.getElementById("pPrice");
        const qtyInput = document.getElementById("pQty");

        searchInput.addEventListener('input', function() {
            const val = this.value.trim().toLowerCase();
            resBox.innerHTML = "";
            if(!val) { resBox.style.display = "none"; return; }
            let found = false;
            Object.keys(cloudProducts).forEach(id => {
                const p = cloudProducts[id];
                if(p.name && p.name.toLowerCase().includes(val)) {
                    found = true;
                    let d = document.createElement("div");
                    d.className = "search-item";
                    d.innerHTML = `<span>${p.name}</span> <span style="color:blue;">${p.stock || 0}</span>`;
                    d.onclick = () => {
                        selectedId = id; searchInput.value = p.name;
                        priceInput.value = p.price || 0; resBox.style.display = "none";
                        qtyInput.focus();
                    };
                    resBox.appendChild(d);
                }
            });
            resBox.style.display = found ? "block" : "none";
        });

        document.addEventListener('click', (e) => { if (e.target !== searchInput) resBox.style.display = "none"; });

        function showNotice(msg) {
            const a = document.getElementById('customAlert');
            a.innerText = msg; a.style.display = 'block';
            setTimeout(() => a.style.display = 'none', 3000);
        }

        window.addItem = () => {
            const name = searchInput.value.trim();
            const price = parseFloat(priceInput.value);
            const qty = parseInt(qtyInput.value);
            if(!name || isNaN(price) || isNaN(qty) || qty <= 0) return showNotice("أكمل البيانات");
            items.push({ id: selectedId, name, price, qty, total: price * qty });
            render();
            searchInput.value = ""; priceInput.value = ""; qtyInput.value = "1"; selectedId = null;
            searchInput.focus();
        };

        function render() {
            const b = document.getElementById('invoiceBody');
            let t = 0; b.innerHTML = "";
            items.forEach((it, i) => {
                t += it.total;
                b.innerHTML += `<tr><td>${it.name}</td><td>${it.price}</td><td>${it.qty}</td><td>${it.total}</td><td class="no-print"><button onclick="items.splice(${i},1);render()" style="border:none; background:none; cursor:pointer;">❌</button></td></tr>`;
            });
            document.getElementById('finalTotal').innerText = t;
        }

        window.toggleReturn = () => {
            isReturn = !isReturn;
            const btn = document.getElementById("modeBtn");
            btn.innerText = isReturn ? "🔄 وضع المرتجع (خصم)" : "🔄 وضع البيع الحالي";
            btn.style.background = isReturn ? "var(--return-color)" : "#333";
            document.getElementById("bodyTag").style.backgroundColor = isReturn ? "#fff0f0" : "#f1f5f9";
        };

        window.finish = async () => {
            if(items.length === 0) return showNotice("الفاتورة فارغة");
            try {
                for(let item of items) {
                    if(item.id && cloudProducts[item.id]) {
                        let currentStock = cloudProducts[item.id].stock || 0;
                        let newStock = isReturn ? (currentStock + item.qty) : (currentStock - item.qty);
                        await db.ref("products/" + item.id).update({ stock: newStock });
                    }
                }
                const totalVal = items.reduce((a, b) => a + b.total, 0);
                await db.ref("history").push({
                    invoiceNum: document.getElementById('invNum').innerText,
                    date: new Date().toLocaleDateString('en-CA'),
                    total: isReturn ? -totalVal : totalVal,
                    type: isReturn ? "return" : "sale",
                    items: items
                });
                window.print();
                setTimeout(() => { location.reload(); }, 1200);
            } catch(e) { console.error(e); showNotice("حدث خطأ!"); }
        };
    </script>
</body>
</html>
