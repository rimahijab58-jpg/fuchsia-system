<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام فاتورة فوشيا - للموبايل</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* إعدادات الموبايل (تجعل الجداول قابلة للتمرير) */
        @media screen and (max-width: 600px) {
            .invoice { padding: 10px; margin: 5px; width: auto; }
            table { display: block; overflow-x: auto; white-space: nowrap; } /* سر الموبايل */
            input { font-size: 16px !important; } /* تمنع الزووم التلقائي في الآيفون */
            .add-btn, .print-btn { padding: 15px; font-size: 18px; }
        }

        /* إعدادات الطباعة (بدون تغيير) */
        @media print {
            .no-print, .no-print-nav { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            .invoice-container { 
                width: 100% !important; 
                max-width: 80mm; 
                padding: 10px; 
                display: block !important;
            }
            #printArea { display: block !important; }
        }

        #printArea { display: none; }
        .invoice table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .invoice th, .invoice td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .invoice input { width: 90px; padding: 8px; border: 1px solid #ccc; text-align: center; border-radius: 4px; }

        /* تنسيق الفاتورة المطبوعة */
        .print-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #000; padding-bottom: 15px; margin-bottom: 15px; }
        .right-section { text-align: right; width: 40%; padding-right: 5px; }
        .brand-title { font-size: 28px; font-weight: bold; margin: 0; }
        .left-section { text-align: left; width: 40%; font-size: 11px; font-weight: bold; padding-left: 10px; line-height: 1.6; }
        .qr-section { width: 20%; text-align: center; }

        .items-list { width: 100%; border-collapse: collapse; }
        .items-list th { border-bottom: 1px solid #000; padding: 5px; font-size: 12px; }
        .items-list td { padding: 8px 0; font-size: 13px; text-align: center; border-bottom: 1px dashed #eee; }

        .google-search { margin-top: 25px; display: flex; justify-content: center; }
        .search-box { border: 1px solid #dfe1e5; border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; font-size: 11px; }
    </style>
</head>
<body>

<div class="no-print-nav" style="text-align: center; padding: 10px; background: #eee; margin-bottom: 10px;">
    <a href="index.html" style="text-decoration:none;">🏠 فاتورة</a> | 
    <a href="products.html" style="text-decoration:none;">📦 مخزن</a> | 
    <a href="history.html" style="text-decoration:none;">📑 سجل</a>
</div>

<div class="invoice no-print">
    <h2 style="text-align: center;">إدخال فاتورة (موبايل)</h2>
    <div style="margin-bottom:10px;">
        <label>العميل:</label>
        <input id="customer" placeholder="Cash Customer" style="width: 70%; display: inline-block;">
    </div>

    <div style="overflow-x: auto;">
        <table id="invoiceTable">
            <thead>
                <tr>
                    <th>الصنف</th>
                    <th>سعر</th>
                    <th>كمية</th>
                    <th>خصم</th>
                    <th>إجمالي</th>
                    <th>حذف</th>
                </tr>
            </thead>
            <tbody id="items"></tbody>
        </table>
    </div>

    <button class="add-btn" onclick="addRow()" style="margin-top: 15px; width:100%; height: 50px; background:#007bff; color:white; border:none; border-radius:8px; font-weight:bold;">+ إضافة صنف</button>
    <h3 id="grandTotal" style="text-align: center; background:#f8f9fa; padding:15px; border-radius:8px; margin-top:10px;">Total: 0</h3>
    <button class="print-btn" onclick="saveAndPrint()" style="width:100%; height: 60px; background:#28a745; color:white; border:none; border-radius:8px; font-weight:bold; font-size:20px;">حفظ وطباعة 🖨️</button>
</div>

<div id="printArea" class="invoice-container">
    <div class="print-header">
        <div class="right-section">
            <h1 class="brand-title">فوشيا</h1>
            <div style="font-size: 11px; font-weight: bold;">رقم: <span id="p-inv-id"></span><br>التاريخ: <span id="p-date"></span></div>
        </div>
        <div class="qr-section">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=https://chat.whatsapp.com/EnzS1EbY5BfAl6rQsHqiPK" width="70">
        </div>
        <div class="left-section">طرحة - خمار - زي شرعي<br>سمسطا - ش بورسعيد<br>01287863711</div>
    </div>
    <p style="font-size: 13px; font-weight: bold; margin: 10px 5px;">العميل: <span id="p-customer"></span></p>
    <table class="items-list">
        <thead><tr><th style="text-align: right;">الصنف</th><th>سعر</th><th>كمية</th><th>إجمالي</th></tr></thead>
        <tbody id="printItems"></tbody>
    </table>
    <h3 style="text-align: left; border-top: 1px solid #000; padding-top: 10px;">الإجمالي: <span id="p-grand-total">0</span></h3>
    <div class="google-search"><div class="search-box"><img src="https://www.google.com/images/branding/googleg/1x/googleg_standard_color_128dp.png" width="14" style="margin-left: 8px;"><b>فوشيا سمسطا</b></div></div>
    <p style="text-align: center; font-size: 10px; margin-top: 15px;">شكراً لزيارتكم</p>
</div>

<script src="invoice.js"></script>
</body>
</html>
