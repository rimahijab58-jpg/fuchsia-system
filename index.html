<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUCHSIA - نظام الفواتير الاحترافي</title>
    <style>
        :root { --main-color: #7209b7; --accent-color: #f72585; --bg-gray: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; }
        .nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .nav a { text-decoration: none; color: white; background: var(--main-color); padding: 8px 15px; border-radius: 20px; font-size: 14px; transition: 0.3s; }
        .nav a:hover { opacity: 0.8; }
        .invoice-card { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--main-color); }
        h1 { color: #333; margin: 0; font-size: 28px; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; }
        .input-group { background: #fdfdfd; border: 1px dashed #ddd; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 8px; box-sizing: border-box; }
        .btn-add { background: var(--accent-color); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { border-bottom: 2px solid #eee; padding: 10px; color: #555; }
        td { padding: 15px 10px; border-bottom: 1px solid #f9f9f9; text-align: center; }
        .total-box { margin-top: 25px; padding: 15px; background: #fff0f6; border-radius: 10px; color: var(--accent-color); font-size: 22px; font-weight: bold; }
        .btn-save { background: #2ecc71; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 18px; margin-top: 15px; font-weight: bold; }
        @media print { .no-print { display: none; } .invoice-card { box-shadow: none; border: none; width: 100%; padding: 0; } }
    </style>
</head>
<body>
    <div class="nav no-print">
        <a href="index.html">🧾 الفاتورة</a>
        <a href="products.html">📦 المخزن</a>
        <a href="history.html">📊 التحليلات والتاريخ</a>
    </div>

    <div class="invoice-card">
        <h1>FUCHSIA - فوشيا</h1>
        <p class="subtitle">إدارة المبيعات السحابية الاحترافية</p>

        <div class="input-group no-print">
            <select id="productSelect"><option>جاري التحميل...</option></select>
            <input type="number" id="qty" value="1" min="1">
            <button class="btn-add" onclick="addToInvoice()">+ إضافة صنف للفاتورة</button>
        </div>

        <table>
            <thead><tr><th>الصنف</th><th>سعر</th><th>كمية</th><th>إجمالي</th></tr></thead>
            <tbody id="invoiceBody"></tbody>
        </table>

        <div class="total-box">الإجمالي: <span id="finalTotal">0</span> ج.م</div>
        <button class="btn-save no-print" onclick="processAndPrint()">✅ حفظ وطباعة الفاتورة</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcd740Bwq4XRrMzVPVqI-G4SmpzvCNqlU",
            authDomain: "fuchsia-web-e1ffe.firebaseapp.com",
            databaseURL: "https://fuchsia-web-e1ffe-default-rtdb.firebaseio.com",
            projectId: "fuchsia-web-e1ffe",
            storageBucket: "fuchsia-web-e1ffe.firebasestorage.app",
            messagingSenderId: "1036149958008",
            appId: "1:1036149958008:web:673873d603b7fcbb29148d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let cloudProducts = {}; let invoiceItems = [];

        db.ref("products").on("value", (s) => {
            cloudProducts = s.val() || {};
            const sel = document.getElementById("productSelect");
            sel.innerHTML = '<option value="">-- اختر صنف --</option>';
            Object.keys(cloudProducts).forEach(id => {
                sel.innerHTML += `<option value="${id}">${cloudProducts[id].name} (متاح: ${cloudProducts[id].stock})</option>`;
            });
        });

        function addToInvoice() {
            const id = document.getElementById("productSelect").value;
            const q = parseInt(document.getElementById("qty").value);
            if(!id || q <= 0) return alert("خطأ في البيانات");
            const p = cloudProducts[id];
            if(q > p.stock) return alert("المخزن لا يكفي");
            invoiceItems.push({id, name: p.name, price: p.price, qty: q, total: p.price*q});
            render();
        }

        function render() {
            const b = document.getElementById("invoiceBody");
            let t = 0; b.innerHTML = "";
            invoiceItems.forEach(i => {
                t += i.total;
                b.innerHTML += `<tr><td>${i.name}</td><td>${i.price}</td><td>${i.qty}</td><td>${itemTotal = i.total}</td></tr>`;
            });
            document.getElementById("finalTotal").innerText = t;
        }

        async function processAndPrint() {
            if(invoiceItems.length === 0) return;
            const now = new Date();
            const saleData = {
                timestamp: now.getTime(),
                dateLabel: now.toLocaleDateString('en-CA'), // YYYY-MM-DD لسهولة الفلترة
                items: invoiceItems,
                grandTotal: document.getElementById("finalTotal").innerText
            };

            for(let i of invoiceItems) {
                await db.ref("products/"+i.id).update({stock: cloudProducts[i.id].stock - i.qty});
            }
            await db.ref("history").push(saleData);
            alert("تم الحفظ في السحاب!");
            window.print();
            location.reload();
        }
    </script>
</body>
</html>
